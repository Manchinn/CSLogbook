<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{emailTitle}}</title>
    <style>
        body {
            font-family: 'Sarabun', 'TH SarabunPSK', 'Segoe UI', 'Tahoma', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            line-height: 1.7;
            color: #333333;
            margin: 0;
            padding: 0;
            background-color: #f5f7fa;
        }
        .container {
            width: 100%;
            max-width: 650px;
            margin: 30px auto;
            background-color: #ffffff;
            border: 1px solid #e1e8ed;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }
        .header {
            background: linear-gradient(135deg, #AC3520 0%, #8B2A18 100%);
            color: #ffffff;
            padding: 32px 24px;
            text-align: center;
        }
        .header img {
            max-width: 180px;
            margin-bottom: 16px;
            filter: brightness(0) invert(1);
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        .header p {
            margin: 8px 0 0 0;
            font-size: 14px;
            opacity: 0.9;
        }
        .content {
            padding: 32px 24px;
        }
        .content p {
            margin-bottom: 14px;
        }
        .footer {
            background-color: #f8fafc;
            color: #64748b;
            text-align: center;
            padding: 24px;
            font-size: 13px;
            border-top: 1px solid #e2e8f0;
        }
        .footer p {
            margin: 4px 0;
        }
        .footer .copyright {
            font-weight: 500;
            color: #475569;
        }
        .footer .disclaimer {
            font-style: italic;
            color: #94a3b8;
        }
        @media (max-width: 600px) {
            .container {
                margin: 20px 16px;
                border-radius: 8px;
            }
            .content {
                padding: 24px 20px;
            }
            .header {
                padding: 24px 20px;
            }
        }
        {{extraStyles}}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://www.kmutnb.ac.th/getattachment/about/symbols/logo_kmutnb-(6).png.aspx?width=250&height=246" alt="KMUTNB Logo">
            <h1>{{headerTitle}}</h1>
            <p>CS Logbook</p>
        </div>
        <div class="content">
            {{content}}
        </div>
        <div class="footer">
            <p class="copyright">&copy; {{currentYear}} CS Logbook System</p>
            <p>ภาควิชาวิทยาการคอมพิวเตอร์และสารสนเทศ คณะวิทยาศาสตร์ประยุกต์</p>
            <p>มหาวิทยาลัยเทคโนโลยีพระจอมเกล้าพระนครเหนือ</p>
            <p class="disclaimer">อีเมลนี้ถูกส่งโดยระบบอัตโนมัติ กรุณาอย่าตอบกลับอีเมลนี้</p>
        </div>
    </div>
</body>
</html>
