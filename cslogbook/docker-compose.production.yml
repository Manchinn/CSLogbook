# CSLogbook Production - VPS 168.144.38.167
# MySQL + Backend (Node.js) + Frontend (Next.js)

services:
  mysql:
    image: mysql:8.0
    container_name: cslogbook-mysql
    restart: unless-stopped
    command: >-
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    image: ghcr.io/${GHCR_OWNER}/cslogbook-backend:latest
    container_name: cslogbook-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      PORT: 5000
      BASE_URL: ${BASE_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    volumes:
      - backend-uploads:/app/uploads
      - backend-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    # Internal only - nginx บน host จะ proxy ผ่าน 127.0.0.1
    ports:
      - "127.0.0.1:5000:5000"
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    image: ghcr.io/${GHCR_OWNER}/cslogbook-frontend:latest
    container_name: cslogbook-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    # Internal only - nginx บน host จะ proxy ผ่าน 127.0.0.1
    ports:
      - "127.0.0.1:3000:3000"
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  mysql-data:
  backend-uploads:
  backend-logs:
